name: Deploy to Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Set Environment Variables
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          # Set NEXTAUTH_SECRET if not exists
          curl -sf -X POST "https://api.vercel.com/v10/projects/${PROJECT_ID}/env" \
            -H "Authorization: Bearer ${VERCEL_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '[{"key":"NEXTAUTH_SECRET","value":"payprompt-mvp-secret-2026-prod","type":"encrypted","target":["production","preview","development"]}]' || echo "NEXTAUTH_SECRET may already exist"

          # Set NEXTAUTH_URL for production
          curl -sf -X POST "https://api.vercel.com/v10/projects/${PROJECT_ID}/env" \
            -H "Authorization: Bearer ${VERCEL_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '[{"key":"NEXTAUTH_URL","value":"https://paypromptmvp.vercel.app","type":"encrypted","target":["production","preview"]}]' || echo "NEXTAUTH_URL may already exist"

          # Set DATABASE_URL placeholder if not exists
          curl -sf -X POST "https://api.vercel.com/v10/projects/${PROJECT_ID}/env" \
            -H "Authorization: Bearer ${VERCEL_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '[{"key":"DATABASE_URL","value":"postgresql://placeholder:placeholder@localhost:5432/payprompt","type":"encrypted","target":["production","preview","development"]}]' || echo "DATABASE_URL may already exist"

          # Set DATABASE_URL_UNPOOLED placeholder
          curl -sf -X POST "https://api.vercel.com/v10/projects/${PROJECT_ID}/env" \
            -H "Authorization: Bearer ${VERCEL_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '[{"key":"DATABASE_URL_UNPOOLED","value":"postgresql://placeholder:placeholder@localhost:5432/payprompt","type":"encrypted","target":["production","preview","development"]}]' || echo "DATABASE_URL_UNPOOLED may already exist"

      - name: Pull Vercel Environment
        run: vercel pull --yes --environment=production --token ${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build
        run: vercel build --prod --token ${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy
        run: vercel deploy --prebuilt --prod --token ${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

name: Setup Neon Database

on:
  push:
    branches: [main]
    paths: ['.github/workflows/setup-database.yml']
  workflow_dispatch:

jobs:
  setup-neon:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Link Vercel Project
        run: vercel link --yes --token ${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Check Current Env Vars
        run: vercel env ls --token ${{ secrets.VERCEL_TOKEN }} 2>&1 || true
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Try Creating Vercel Postgres
        run: |
          # Try different ways to create a Vercel Postgres database
          echo "=== Method 1: vercel postgres ==="
          vercel postgres create payprompt-db --token ${{ secrets.VERCEL_TOKEN }} 2>&1 || echo "Method 1 failed"

          echo "=== Method 2: vercel storage ==="
          vercel storage create --type postgres --name payprompt-db 2>&1 || echo "Method 2 failed"

          echo "=== Method 3: npx @vercel/postgres ==="
          npx @vercel/postgres create payprompt-db 2>&1 || echo "Method 3 failed"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Check Vercel Project Info via API
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          echo "=== Project Info ==="
          curl -s "https://api.vercel.com/v9/projects/${PROJECT_ID}" \
            -H "Authorization: Bearer ${VERCEL_TOKEN}" | python3 -c "
import sys,json
try:
    data = json.load(sys.stdin)
    print('Name:', data.get('name','N/A'))
    print('Framework:', data.get('framework','N/A'))
    for e in data.get('env', []):
        targets = ', '.join(e.get('target', []))
        val = e.get('value','')
        val_preview = val[:50] + '...' if len(val) > 50 else val
        print(f'  ENV: {e[\"key\"]} = {val_preview} [{targets}]')
except Exception as ex:
    print('Error:', ex)
" || echo "Could not get project info"

          echo ""
          echo "=== Trying Neon integration endpoints ==="

          # Try /v1/integrations/configuration
          echo "--- /v1/integrations/configuration ---"
          curl -s -X POST "https://api.vercel.com/v1/integrations/configuration" \
            -H "Authorization: Bearer ${VERCEL_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"projectId\":\"${PROJECT_ID}\",\"slug\":\"neon\",\"type\":\"postgres\"}" 2>&1

          echo ""
          echo "--- /v1/integrations ---"
          curl -s "https://api.vercel.com/v1/integrations?slug=neon" \
            -H "Authorization: Bearer ${VERCEL_TOKEN}" 2>&1 | python3 -c "
import sys,json
try:
    data = json.load(sys.stdin)
    integrations = data if isinstance(data, list) else data.get('integrations', [])
    for i in integrations[:5]:
        print(f'  {i.get(\"name\")} - slug: {i.get(\"slug\")} - id: {i.get(\"id\")}')
except Exception as ex:
    print('Error parsing:', ex)
" || echo "Could not search integrations"

name: Setup Neon Database

on:
  workflow_dispatch:
    inputs:
      neon_api_key:
        description: 'Neon API Key (get from https://console.neon.tech/app/settings/api-keys)'
        required: true
        type: string

jobs:
  setup-neon:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Create Neon Project
        id: create_neon
        env:
          NEON_API_KEY: ${{ inputs.neon_api_key }}
        run: |
          echo "Creating Neon project..."
          RESPONSE=$(curl -s -X POST 'https://console.neon.tech/api/v2/projects' \
            -H 'Accept: application/json' \
            -H "Authorization: Bearer ${NEON_API_KEY}" \
            -H 'Content-Type: application/json' \
            -d '{
              "project": {
                "name": "payprompt-mvp",
                "region_id": "aws-ap-southeast-1",
                "pg_version": 17
              }
            }')

          # Extract connection URIs
          CONNECTION_URI=$(echo "${RESPONSE}" | python3 -c "
import sys,json
try:
    data = json.load(sys.stdin)
    uris = data.get('connection_uris', [])
    if uris:
        print(uris[0].get('connection_uri', ''))
    else:
        # Fallback: construct from project data
        p = data.get('project', {})
        conn_params = data.get('connection_parameters', {})
        host = conn_params.get('host', '')
        if not host:
            host = p.get('host', '')
        db = conn_params.get('database', 'neondb')
        user = conn_params.get('role', 'neondb_owner')
        pw = conn_params.get('password', data.get('password', ''))
        if host and pw:
            print(f'postgresql://{user}:{pw}@{host}/{db}?sslmode=require')
        else:
            print('')
except Exception as e:
    print('')
" 2>/dev/null)

          if [ -z "$CONNECTION_URI" ]; then
            echo "❌ Failed to create Neon project"
            echo "Response: ${RESPONSE}"
            exit 1
          fi

          echo "✅ Neon project created!"
          echo "Connection URI (masked): postgresql://***@***/neondb?sslmode=require"

          # Create pooled connection URL for Vercel serverless
          POOLED_URL=$(echo "${CONNECTION_URI}" | sed 's/\.aws\.neon\.tech\//''.aws.neon.tech\//' | sed 's/\?sslmode=require/?sslmode=require\&pgbouncer=true/')

          # Save to outputs (masked for security)
          echo "connection_uri=***MASKED***" >> $GITHUB_OUTPUT
          echo "::add-mask::${CONNECTION_URI}"
          echo "::add-mask::${POOLED_URL}"
          echo "connection_uri=${CONNECTION_URI}" >> $GITHUB_ENV
          echo "pooled_url=${POOLED_URL}" >> $GITHUB_ENV

      - name: Update Vercel Environment Variables
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          CONNECTION_URI="${{ env.connection_uri }}"
          POOLED_URL="${{ env.pooled_url }}"

          echo "Updating Vercel environment variables..."

          # Delete existing DATABASE_URL vars for all environments
          for target in production preview development; do
            curl -sf -X DELETE "https://api.vercel.com/v10/projects/${PROJECT_ID}/env?key=DATABASE_URL&target=${target}" \
              -H "Authorization: Bearer ${VERCEL_TOKEN}" > /dev/null 2>&1 || true
            curl -sf -X DELETE "https://api.vercel.com/v10/projects/${PROJECT_ID}/env?key=DATABASE_URL_UNPOOLED&target=${target}" \
              -H "Authorization: Bearer ${VERCEL_TOKEN}" > /dev/null 2>&1 || true
          done

          # Set DATABASE_URL (pooled connection for Vercel serverless)
          curl -sf -X POST "https://api.vercel.com/v10/projects/${PROJECT_ID}/env" \
            -H "Authorization: Bearer ${VERCEL_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "[{
              \"key\": \"DATABASE_URL\",
              \"value\": \"${POOLED_URL}\",
              \"type\": \"encrypted\",
              \"target\": [\"production\",\"preview\",\"development\"]
            }]" > /dev/null

          # Set DATABASE_URL_UNPOOLED (direct connection for migrations)
          curl -sf -X POST "https://api.vercel.com/v10/projects/${PROJECT_ID}/env" \
            -H "Authorization: Bearer ${VERCEL_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "[{
              \"key\": \"DATABASE_URL_UNPOOLED\",
              \"value\": \"${CONNECTION_URI}\",
              \"type\": \"encrypted\",
              \"target\": [\"production\",\"preview\",\"development\"]
            }]" > /dev/null

          echo "✅ Environment variables updated on Vercel!"

      - name: Run Prisma Migration
        run: |
          export DATABASE_URL="${{ env.connection_uri }}"
          export DATABASE_URL_UNPOOLED="${{ env.connection_uri }}"

          npm ci
          npx prisma db push --accept-data-loss 2>&1

          echo "✅ Database schema applied!"

      - name: Trigger Redeployment
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          echo "Triggering redeployment on Vercel..."

          # Get repo ID from GitHub API
          REPO_ID=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/code4indo/payprompt-mvp" | python3 -c "import sys,json; print(json.load(sys.stdin).get('id',0))")

          # Create deployment
          curl -sf -X POST "https://api.vercel.com/v13/deployments" \
            -H "Authorization: Bearer ${VERCEL_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{
              \"projectId\": \"${PROJECT_ID}\",
              \"target\": \"production\",
              \"gitSource\": {
                \"type\": \"github\",
                \"ref\": \"main\",
                \"repoId\": ${REPO_ID}
              }
            }" > /dev/null 2>&1 || echo "Note: Could not trigger deployment via API. Please redeploy manually from Vercel dashboard."

          echo "✅ Database setup complete!"
          echo "============================================"
          echo "Next: Visit https://paypromptmvp.vercel.app/signup to test registration"
          echo "============================================"

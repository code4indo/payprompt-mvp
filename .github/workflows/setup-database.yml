name: Setup Neon Database

on:
  workflow_dispatch:

jobs:
  setup-neon:
    runs-on: ubuntu-latest
    steps:
      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Create Vercel Postgres Database
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          echo "Linking to Vercel project..."
          vercel link --yes --token ${VERCEL_TOKEN}

          echo "Creating Vercel Postgres (Neon) database..."
          # Try creating a Postgres database using Vercel CLI
          vercel env ls --token ${VERCEL_TOKEN} || true

          # List existing stores
          echo "Checking existing storage..."
          vercel storage ls --token ${VERCEL_TOKEN} || true

          # Create a Postgres store
          echo "Attempting to create Postgres store..."
          vercel postgres create payprompt-postgres --token ${VERCEL_TOKEN} 2>&1 || echo "Postgres create may need different command"

          # Also try the env command approach
          echo "Listing env vars..."
          vercel env ls --token ${VERCEL_TOKEN} 2>&1 || true

      - name: Check and Report Environment Variables
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          echo "Current environment variables on Vercel project:"
          curl -s "https://api.vercel.com/v9/projects/${PROJECT_ID}" \
            -H "Authorization: Bearer ${VERCEL_TOKEN}" | python3 -c "
import sys,json
data = json.load(sys.stdin)
env_keys = [e.get('key','') for e in data.get('env', [])]
print('Env vars:', env_keys)
print('Project name:', data.get('name',''))
print('Framework:', data.get('framework',''))
" 2>/dev/null || echo "Could not retrieve project info"
